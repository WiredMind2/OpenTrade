services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./data:/app/data
      - ./db:/app/db
      - ./.env:/app/.env:ro
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '5173:5173'
    environment:
      - BACKEND_HOST=backend
      - BROWSER=none
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
