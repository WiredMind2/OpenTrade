[pytest]
minversion = 6.0
addopts = -ra -q --strict-markers --strict-config --asyncio-mode=auto
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    asyncio: marks tests that require asyncio event loop
    unit: marks tests as unit tests
    data: marks tests that require data files
    model: marks tests that require model files
    database: marks tests that require database access
    script: marks tests that test script functionality
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning